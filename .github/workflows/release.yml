name: Release

on:
  push:
    tags:
      - "v*"

# 统一在最顶层配置完整的写入权限，防止子任务因声明 packages: write 而覆盖掉 contents 权限
permissions:
  contents: write
  packages: write

jobs:
  # ================= 任务 1：编译二进制并上传到 Release =================
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            name: ddns-linux-amd64
          - goos: linux
            goarch: arm64
            name: ddns-linux-arm64
          - goos: darwin
            goarch: amd64
            name: ddns-darwin-amd64
          - goos: darwin
            goarch: arm64
            name: ddns-darwin-arm64
          - goos: windows
            goarch: amd64
            name: ddns-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -ldflags="-s -w" -o dist/${{ matrix.name }} ./cmd/ddns

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ================= 任务 2：构建通用版 Docker 镜像 (并发 A) =================
  docker-generic:
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Normalize repository owner
        run: echo "OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push generic image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: generic
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.OWNER }}/ddns:${{ github.ref_name }}
            ghcr.io/${{ env.OWNER }}/ddns:latest

  # ================= 任务 3：矩阵并发构建软路由专用版 (并发 B 和 C) =================
  docker-openwrt:
    runs-on: ubuntu-latest
    needs: build-binaries
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            openwrt_tag: x86-64
            suffix: amd64
          - platform: linux/arm64
            openwrt_tag: aarch64_cortex-a53
            suffix: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Normalize repository owner
        run: echo "OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push OpenWrt image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: openwrt
          build-args: |
            OPENWRT_TAG=${{ matrix.openwrt_tag }}
          push: true
          platforms: ${{ matrix.platform }}
          tags: |
            ghcr.io/${{ env.OWNER }}/ddns:${{ github.ref_name }}-openwrt-${{ matrix.suffix }}
            ghcr.io/${{ env.OWNER }}/ddns:latest-openwrt-${{ matrix.suffix }}
