name: Release

on:
  push:
    tags:
      - "v*"

# 统一在最顶层配置完整的写入权限
permissions:
  contents: write
  packages: write

jobs:
  # ================= 任务 1：编译各平台二进制并暂存 Artifact =================
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            name: ddns-linux-amd64
          - goos: linux
            goarch: arm64
            name: ddns-linux-arm64
          - goos: darwin
            goarch: amd64
            name: ddns-darwin-amd64
          - goos: darwin
            goarch: arm64
            name: ddns-darwin-arm64
          - goos: windows
            goarch: amd64
            name: ddns-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -ldflags="-s -w" -o dist/${{ matrix.name }} ./cmd/ddns

      # 使用 artifact 暂存二进制产物，避免 matrix 并发上传 Release 产生竞争
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}

  # ================= 任务 2：创建 GitHub Release 并添加发布说明 =================
  create-release:
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          merge-multiple: true

      - name: Create GitHub Release with Release Notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          # 🚀 核心：开启 GitHub 官方自动发布说明生成
          generate_release_notes: true
          # 自动把 ./dist 下的所有二进制文件一次性附加上传到 Release 附件中
          files: ./dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ================= 任务 3：构建通用版 Docker 镜像 =================
  docker-generic:
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Normalize repository owner
        run: echo "OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push generic image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: generic
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.OWNER }}/ddns:${{ github.ref_name }}
            ghcr.io/${{ env.OWNER }}/ddns:latest

  # ================= 任务 4：构建软路由专用版 =================
  docker-openwrt:
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Normalize repository owner
        run: echo "OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push OpenWrt image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: openwrt
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ env.OWNER }}/ddns:${{ github.ref_name }}-openwrt
            ghcr.io/${{ env.OWNER }}/ddns:latest-openwrt
